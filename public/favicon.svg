<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background in brand blue -->
  <rect width="32" height="32" rx="7" fill="#1a73e8"/>
  <!-- Outer range ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="white" stroke-width="1.6" stroke-opacity="0.55"/>
  <!-- Middle range ring -->
  <circle cx="16" cy="16" r="6"  fill="none" stroke="white" stroke-width="1.6" stroke-opacity="0.55"/>
  <!-- Crosshairs -->
  <line x1="16" y1="5"  x2="16" y2="27" stroke="white" stroke-width="1"   stroke-opacity="0.3"/>
  <line x1="5"  y1="16" x2="27" y2="16" stroke="white" stroke-width="1"   stroke-opacity="0.3"/>
  <!-- Sweep line from centre toward upper-right -->
  <line x1="16" y1="16" x2="24" y2="8"  stroke="white" stroke-width="2"   stroke-linecap="round"/>
  <!-- Centre blip -->
  <circle cx="16" cy="16" r="2.8" fill="white"/>
</svg>
